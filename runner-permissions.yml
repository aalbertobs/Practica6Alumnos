apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default # El namespace donde se despliega tu hospital
  name: gha-runner-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps"] # Añadimos secrets para que Helm funcione
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: default
  name: gha-runner-rolebinding
subjects:
  - kind: ServiceAccount
    name: self-hosted-gha-rs-no-permission
    namespace: ips # El Runner vive aquí, pero manda en 'default'
roleRef:
  kind: Role
  name: gha-runner-role
  apiGroup: rbac.authorization.k8s.io