name: CI/CD Pipeline Hospital

# 1. Eventos disparadores: push y pull_request al repositorio
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 2. Entorno de ejecución host
    runs-on: ubuntu-latest

    steps:
      # 3. Descargar el código
      - name: Descargar el código
        uses: actions/checkout@v4

      # 4. Configurar Java con caché para acelerar las dependencias
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 5. Dar permisos de ejecución al wrapper de Maven (requisito del enunciado)
      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      # 6. Compilar el proyecto (usamos --batch-mode para logs más limpios)
      - name: Compilar el proyecto
        run: ./mvnw compile --no-transfer-progress --batch-mode

      # 7. Ejecutar los tests de integración
      - name: Ejecutar pruebas de integración
        run: ./mvnw verify --no-transfer-progress --batch-mode

      # 8. Persistir los reportes XML (buena práctica del temario)
      - name: Guardar artefactos de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/failsafe-reports/

      # 9. Generar el informe visual de resultados (GitHub Test Reporter)
      - name: Generar informe de GitHub Test Reporter
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultados de Pruebas de Integración
          path: target/failsafe-reports/*.xml
          reporter: java-junit